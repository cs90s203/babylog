<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>寶寶日誌</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👶</text></svg>">
<meta name="theme-color" content="#FAF6EF">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/style.css">
<script>
// Set the theme attribute on <html> before first paint so there's no flash of the
// wrong theme (or unstyled white) while the main scripts below are still loading.
(function () {
  try {
    var pref = localStorage.getItem('bt_local_theme') || 'auto';
    var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var night = pref === 'night' || (pref === 'auto' && sysDark);
    document.documentElement.setAttribute('data-theme', night ? 'night' : 'day');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'day');
  }
})();
</script>
</head>
<body>
<div id="root"></div>
<!-- Plain classic scripts (no type="module") so this also works opened directly as a
     local file (file://), where browsers block ES module loading. Order matters: each
     file only references the others' globals from inside function bodies (never at
     top-level), so this load order just needs every file present before main.js runs. -->
<!-- Firebase compat SDK: exposes a global `firebase` namespace, works with plain
     <script src> tags like everything else here (no bundler/ES modules needed). -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/who-data.js"></script>
<script src="js/predict.js"></script>
<script src="js/store.js"></script>
<script src="js/csv.js"></script>
<script src="js/firebase-sync.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
<script src="js/main.js"></script>
</body>
</html>
